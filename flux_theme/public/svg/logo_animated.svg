<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09B474"/>
      <stop offset="100%" style="stop-color:#3DD99A"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#aGrad)">
    <animate attributeName="rx" values="20;30;20" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="60" y="78" font-family="Open Sans, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">F
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </text>
</svg>
