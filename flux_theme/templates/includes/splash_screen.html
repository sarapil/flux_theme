<!-- FLUX Splash — .centered.splash lets Frappe desk.js auto-remove it -->
<div class="centered splash" style="position:fixed;inset:0;width:100vw;height:100vh;background:linear-gradient(180deg,#1A2526 0%,#2D3436 60%,#1a2526 100%);z-index:99999;display:flex;align-items:center;justify-content:center;margin:0;padding:0;overflow:hidden;">
    <!-- Modern City Skyline SVG Background -->
    <svg viewBox="0 0 1920 600" preserveAspectRatio="xMidYMax slice" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:0.5;">
        <defs>
            <linearGradient id="sp-skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1A2526"/>
                <stop offset="50%" style="stop-color:#2D3436"/>
                <stop offset="100%" style="stop-color:#3D4F51"/>
            </linearGradient>
            <linearGradient id="sp-greenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#09B474;stop-opacity:0.3"/>
                <stop offset="100%" style="stop-color:#09B474;stop-opacity:0"/>
            </linearGradient>
            <filter id="sp-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <!-- Sky -->
        <rect width="1920" height="600" fill="url(#sp-skyGrad)"/>
        <!-- Stars -->
        <g fill="#F0F5F3" opacity="0.4">
            <circle cx="200" cy="60" r="1.2"/><circle cx="450" cy="30" r="0.8"/><circle cx="680" cy="70" r="1"/>
            <circle cx="900" cy="20" r="1.3"/><circle cx="1150" cy="55" r="0.9"/><circle cx="1400" cy="40" r="1.1"/>
            <circle cx="1650" cy="65" r="0.7"/><circle cx="1800" cy="25" r="1"/>
        </g>
        <!-- Modern City Buildings -->
        <g fill="#0D1117">
            <!-- Office towers left -->
            <rect x="80" y="200" width="50" height="200"/>
            <rect x="140" y="160" width="60" height="240"/>
            <rect x="210" y="220" width="40" height="180"/>
            <!-- Co-working hub (distinctive shape) -->
            <path d="M350,400 L350,140 Q400,120 450,140 L450,400 Z"/>
            <rect x="370" y="150" width="20" height="15" fill="#09B474" opacity="0.6"/>
            <rect x="410" y="150" width="20" height="15" fill="#09B474" opacity="0.4"/>
            <!-- Modern glass tower -->
            <rect x="520" y="120" width="70" height="280"/>
            <rect x="525" y="125" width="28" height="10" fill="#09B474" opacity="0.3"/>
            <rect x="557" y="125" width="28" height="10" fill="#09B474" opacity="0.2"/>
            <!-- Tall spire -->
            <path d="M700,400 L720,60 L740,60 L760,400 Z"/>
            <rect x="725" y="45" width="10" height="18"/>
            <!-- Cluster mid-city -->
            <rect x="830" y="180" width="55" height="220"/>
            <rect x="895" y="140" width="65" height="260"/>
            <rect x="970" y="200" width="45" height="200"/>
            <!-- Landmark tower -->
            <path d="M1080,400 L1100,80 Q1130,60 1160,80 L1180,400 Z"/>
            <circle cx="1130" cy="90" r="15" fill="#09B474" opacity="0.4"/>
            <!-- Right cluster -->
            <rect x="1280" y="170" width="50" height="230"/>
            <rect x="1340" y="150" width="60" height="250"/>
            <rect x="1410" y="190" width="45" height="210"/>
            <!-- Crane (construction/growth symbol) -->
            <rect x="1520" y="100" width="6" height="300"/>
            <rect x="1480" y="100" width="80" height="4"/>
            <line x1="1526" y1="104" x2="1556" y2="160" stroke="#0D1117" stroke-width="2"/>
            <!-- Far right buildings -->
            <rect x="1650" y="220" width="50" height="180"/>
            <rect x="1710" y="190" width="60" height="210"/>
            <rect x="1780" y="230" width="45" height="170"/>
            <rect x="1840" y="250" width="80" height="150"/>
            <!-- Ground line -->
            <rect x="0" y="398" width="1920" height="4"/>
        </g>
        <!-- Green accent glow at base -->
        <rect x="0" y="380" width="1920" height="120" fill="url(#sp-greenGlow)" opacity="0.5"/>
        <!-- Window lights -->
        <g fill="#09B474" opacity="0.15">
            <rect x="145" y="170" width="10" height="6"/><rect x="165" y="170" width="10" height="6"/>
            <rect x="145" y="185" width="10" height="6"/><rect x="185" y="185" width="10" height="6"/>
            <rect x="835" y="195" width="10" height="6"/><rect x="855" y="195" width="10" height="6"/>
            <rect x="900" y="155" width="12" height="6"/><rect x="920" y="155" width="12" height="6"/>
            <rect x="940" y="155" width="12" height="6"/>
            <rect x="1285" y="185" width="10" height="6"/><rect x="1305" y="185" width="10" height="6"/>
            <rect x="1345" y="165" width="12" height="6"/><rect x="1365" y="165" width="12" height="6"/>
            <rect x="1385" y="165" width="12" height="6"/>
        </g>
    </svg>
    <!-- Content above skyline -->
    <div style="text-align:center;position:relative;z-index:1;">
        <img src="/assets/flux_theme/images/splash.png" alt="FLUX"
             style="max-width:160px;max-height:100px;opacity:0.9;"
             onerror="this.style.display='none'">
        <div style="width:120px;height:2px;background:linear-gradient(90deg,transparent,#3DD99A,#09B474,#3DD99A,transparent);margin:20px auto;opacity:0.7;"></div>
        <p style="font-family:'Open Sans',sans-serif;font-size:12px;font-weight:300;color:#F0F5F3;letter-spacing:0.15em;text-transform:uppercase;margin:0;opacity:0.5;">Coworking Space</p>
    </div>
</div>
