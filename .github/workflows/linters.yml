name: Linters

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: linters-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check flux_theme/ --config pyproject.toml
      - run: ruff format --check flux_theme/ --config pyproject.toml

  semgrep:
    name: Semgrep Rules
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install semgrep
      - run: semgrep ci --config "p/frappe" || true

  eslint:
    name: ESLint (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g eslint
      - run: eslint flux_theme/public/js/ --ext .js || true
